      return function IconComponent({ size = 20, strokeWidth = 1.5, className = "" }) {
        const icon = window.lucide && window.lucide.icons ? window.lucide.icons[iconName] : null;
        const svg = icon ? icon.toSvg({
          width: size,
          height: size,
          "stroke-width": strokeWidth,
          class: className
        }) : "";
        return <span className={`inline-flex ${className}`} dangerouslySetInnerHTML={{ __html: svg }} />;
      };
    }

function GoogleAdsSimulator({ onExit }) {
  const [view, setView] = useState('dashboard');

  const [campaigns, setCampaigns] = useState([
    { id: 1, name: 'Search - Mots-clés Marque', type: 'Search', status: 'active', budget: '15,00 €/jour', clicks: '450', impressions: '1 200', ctr: '37,50 %', cpc: '0,45 €', cost: '202,50 €', conversions: '45' },
    { id: 2, name: 'PMax - Lancement Produit', type: 'Performance Max', status: 'active', budget: '50,00 €/jour', clicks: '1 240', impressions: '45 000', ctr: '2,75 %', cpc: '0,85 €', cost: '1 054,00 €', conversions: '112' },
    { id: 3, name: 'Display - Retargeting Visiteurs', type: 'Display', status: 'paused', budget: '10,00 €/jour', clicks: '85', impressions: '15 400', ctr: '0,55 %', cpc: '0,20 €', cost: '17,00 €', conversions: '3' },
  ]);

  const [draft, setDraft] = useState(getInitialGoogleAdsDraft());
  const [currentStep, setCurrentStep] = useState('settings');

  function getInitialGoogleAdsDraft() {
    const initialHeadlines = Array(15).fill('');
    initialHeadlines[0] = 'Formation Marketing Digital';
    initialHeadlines[1] = 'Devenez Expert Google Ads';
    initialHeadlines[2] = 'Inscriptions Ouvertes';

    const initialDescriptions = Array(4).fill('');
    initialDescriptions[0] = 'Inscrivez-vous dès maintenant à notre formation complète en marketing digital.';
    initialDescriptions[1] = 'Maîtrisez le Media Buying, Google Ads et Meta Ads avec des formateurs experts.';

    return {
      settings: { 
        name: 'Nouvelle campagne', 
        goal: 'SALES', 
        type: 'SEARCH', 
        budget: 20, 
        bidding: 'CONVERSIONS', 
        location: 'Belgique', 
        language: 'Français', 
      },
      adGroup: { name: 'Groupe d\'annonces 1', keywords: 'formation marketing digital\ncours google ads\n[ecole de marketing]\n"apprendre le media buying"' },
      ad: { 
        finalUrl: 'https://www.efp.be/formations', 
        path1: 'marketing', path2: 'digital', 
        headlines: initialHeadlines, descriptions: initialDescriptions, 
        images: [], logos: [],
        sitelinks: [
          { text: 'Toutes nos formations', url: 'https://www.efp.be/toutes-formations' },
          { text: 'Inscriptions 2024', url: 'https://www.efp.be/inscription' },
          { text: '', url: '' }, { text: '', url: '' }
        ]
      }
    };
  }

  const handleCreateNew = () => { setDraft(getInitialGoogleAdsDraft()); setCurrentStep('settings'); setView('create'); };

  const handlePublish = () => {
    const typeLabels = { 'SEARCH': 'Search', 'DISPLAY': 'Display', 'PMAX': 'Performance Max', 'VIDEO': 'Vidéo' };
    const newCampaign = {
      id: Date.now(), name: draft.settings.name, type: typeLabels[draft.settings.type], status: 'active', budget: `${draft.settings.budget},00 €/jour`,
      clicks: '0', impressions: '0', ctr: '0,00 %', cpc: '0,00 €', cost: '0,00 €', conversions: '0'
    };
    setCampaigns([newCampaign, ...campaigns]);
    setView('dashboard');
  };

  const updateDraft = (level, field, value) => {
    setDraft(prev => ({ ...prev, [level]: { ...prev[level], [field]: value } }));
  };

  const updateArrayField = (level, field, index, value) => {
    const newArray = [...draft[level][field]];
    newArray[index] = value;
    updateDraft(level, field, newArray);
  };

  return (
    <div className="flex h-screen bg-gray-100 font-sans text-gray-800 overflow-hidden w-full">
      {/* Sidebar Google Ads */}
      <div className="w-16 bg-[#202124] flex flex-col items-center py-4 z-20 shrink-0">
        <button onClick={onExit} className="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-gray-300 mb-6 transition-colors" title="Retour au portail">
          <ArrowLeft size={20} />
        </button>
        <div className="w-8 h-8 mb-6 text-green-400"><Search size={28} /></div>
        <nav className="flex flex-col gap-4 flex-1 w-full text-gray-400">
          <GAdsNavItem icon={<Home size={20} />} active={view === 'dashboard'} onClick={() => setView('dashboard')} title="Vue d'ensemble" />
          <GAdsNavItem icon={<Target size={20} />} active={view === 'create'} title="Campagnes" />
          <GAdsNavItem icon={<Filter size={20} />} title="Mots-clés" />
          <GAdsNavItem icon={<Sidebar size={20} />} title="Annonces" />
          <GAdsNavItem icon={<Users size={20} />} title="Audiences" />
        </nav>
      </div>

      <div className="flex-1 flex flex-col h-full overflow-hidden relative bg-gray-50">
        {view === 'dashboard' ? (
          <GAdsDashboard campaigns={campaigns} onCreateNew={handleCreateNew} />
        ) : (
          <GAdsCreationFlow draft={draft} updateDraft={updateDraft} updateArrayField={updateArrayField} currentStep={currentStep} setCurrentStep={setCurrentStep} onClose={() => setView('dashboard')} onPublish={handlePublish} />
        )}
      </div>
    </div>
  );
}

function GAdsCreationFlow({ draft, updateDraft, updateArrayField, currentStep, setCurrentStep, onClose, onPublish }) {
  const steps = [
    { id: 'settings', label: '1. Paramètres de la campagne' },
    { id: 'adgroup', label: '2. Groupes d\'annonces et ciblage' },
    { id: 'ads', label: '3. Annonces et Composants' }
  ];

  const handleExport = () => {
    let content = `=== ÉVALUATION : SIMULATION GOOGLE ADS ===\nDate : ${new Date().toLocaleString('fr-FR')}\n\n`;
    content += `--- 1. PARAMÈTRES DE LA CAMPAGNE ---\nNom : ${draft.settings.name}\nObjectif : ${draft.settings.goal}\nType : ${draft.settings.type}\nBudget : ${draft.settings.budget}€ / jour\nStratégie d'enchères : ${draft.settings.bidding}\nZones : ${draft.settings.location}\nLangues : ${draft.settings.language}\n\n`;
    content += `--- 2. GROUPE D'ANNONCES ---\nNom : ${draft.adGroup.name}\nMots-clés :\n${draft.adGroup.keywords || 'N/A'}\n\n`;
    content += `--- 3. ANNONCES ---\nURL finale : ${draft.ad.finalUrl}\nChemin : /${draft.ad.path1}/${draft.ad.path2}\n\nTitres :\n${draft.ad.headlines.filter(h => h.trim()).map(h => '- ' + h).join('\n')}\n\nDescriptions :\n${draft.ad.descriptions.filter(d => d.trim()).map(d => '- ' + d).join('\n')}\n\nSitelinks :\n${draft.ad.sitelinks.filter(s => s.text.trim()).map(s => `- ${s.text} (${s.url})`).join('\n')}`;

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `GoogleAds_${draft.settings.name.replace(/\s+/g, '_')}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  return (
    <div className="flex-1 flex flex-col h-full bg-white absolute inset-0 z-30">
      <header className="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shrink-0">
        <div className="flex items-center gap-4">
          <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X size={20} className="text-gray-500" /></button>
          <span className="font-medium text-gray-800 text-lg">Nouvelle campagne</span>
        </div>
        <div className="flex gap-3">
          <button onClick={handleExport} className="px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded text-sm hover:bg-gray-50 flex items-center gap-2">
            <Download size={16} /> Exporter (.txt)
          </button>
          {currentStep === 'ads' ? (
            <button onClick={onPublish} className="px-6 py-2 bg-[#1a73e8] hover:bg-[#1557b0] text-white font-medium rounded text-sm transition-colors shadow-sm">Publier la campagne</button>
          ) : (
            <button onClick={() => setCurrentStep(currentStep === 'settings' ? 'adgroup' : 'ads')} className="px-6 py-2 bg-[#1a73e8] hover:bg-[#1557b0] text-white font-medium rounded text-sm transition-colors shadow-sm">Suivant</button>
          )}
        </div>
      </header>

      <div className="flex flex-1 overflow-hidden">
        <div className="w-64 bg-gray-50 border-r border-gray-200 overflow-y-auto p-4 hidden md:block shrink-0">
          <div className="space-y-2 mt-4">
            {steps.map(step => (
              <div key={step.id} onClick={() => setCurrentStep(step.id)} className={`p-3 rounded-md cursor-pointer text-sm font-medium transition-colors ${currentStep === step.id ? 'bg-[#e8f0fe] text-[#1a73e8]' : 'text-gray-600 hover:bg-gray-200'}`}>
                {step.label}
              </div>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto bg-white p-6 md:p-10">
          <div className={`mx-auto pb-20 ${currentStep === 'ads' ? 'max-w-6xl' : 'max-w-3xl'}`}>
            {currentStep === 'settings' && <GAdsSettingsForm draft={draft} updateDraft={updateDraft} />}
            {currentStep === 'adgroup' && <GAdsAdGroupForm draft={draft} updateDraft={updateDraft} />}
            {currentStep === 'ads' && <GAdsAdForm draft={draft} updateDraft={updateDraft} updateArrayField={updateArrayField} />}
          </div>
        </div>
      </div>
    </div>
  );
}

  const handleOpenCreateModal = () => {

  const startCreationFlow = () => {
    setDraft(getInitialDraft(selectedObjective));
    setCurrentStep('campaign');
    setIsObjectiveModalOpen(false);
    setView('create');

    setDraft({
      ...getInitialDraft(campaignToEdit.objective),

    });

    const newCampaign = {
      id: Date.now(), name: draft.campaign.name, status: 'active', delivery: 'En cours d\'examen',
      budget: `${draft.adSet.budget},00 € / ${draft.adSet.budgetType === 'DAILY' ? 'jour' : 'global'}`,
      amountSpent: '0,00 €', results: '-', reach: '-', impressions: '-', cpc: '-', landingPageViews: '-', postReactions: '-', postComments: '-', postSaves: '-', postShares: '-', engagementRate: '-', instantExpOpen: '-', instantExpStart: '-', trafficGoogle: '-', purchases: '-', objective: draft.campaign.objective
    };
    setCampaigns([newCampaign, ...campaigns]);
    setView('dashboard');
  };

  const handleToggleStatus = (id) => {
    setCampaigns(campaigns.map(camp => {
      if (camp.id === id) {
        const isNowActive = camp.status !== 'active';
        return { ...camp, status: isNowActive ? 'active' : 'paused', delivery: isNowActive ? 'Actif' : 'Désactivé' };
      }
      return camp;
    }));
  };

  const updateDraft = (level, field, value) => {
    setDraft(prev => ({ ...prev, [level]: { ...prev[level], [field]: value } }));
  };

  return (
    <div className="flex h-screen bg-gray-100 font-sans text-gray-800 overflow-hidden w-full">
      <div className="w-16 bg-white border-r border-gray-200 flex flex-col items-center py-4 z-20 shadow-sm shrink-0">
        <button onClick={onExit} className="w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-600 mb-8 transition-colors" title="Retour au portail">
          <ArrowLeft size={20} />
        </button>
        <nav className="flex flex-col gap-6 flex-1 w-full">
          <MetaNavItem icon={<Layout size={20} />} active={view === 'dashboard'} onClick={() => setView('dashboard')} title="Accueil" />
          <MetaNavItem icon={<Megaphone size={20} />} active={view === 'create'} title="Campagnes" />
          <MetaNavItem icon={<Users size={20} />} title="Audiences" />
          <MetaNavItem icon={<Folder size={20} />} title="Bibliothèque" />
          <MetaNavItem icon={<BarChart2 size={20} />} title="Rapports" />
        </nav>
      </div>

      <div className="flex-1 flex flex-col h-full overflow-hidden relative">
        {view === 'dashboard' ? (
          <MetaDashboard 
            campaigns={campaigns} 
            onCreateNew={handleOpenCreateModal} 
            onToggleStatus={handleToggleStatus} 
            onEdit={handleEdit}
            onDuplicate={handleDuplicate}
            isObjectiveModalOpen={isObjectiveModalOpen}
            setIsObjectiveModalOpen={setIsObjectiveModalOpen}
            selectedObjective={selectedObjective}
            setSelectedObjective={setSelectedObjective}

          />
        ) : (
          <CreationFlow draft={draft} updateDraft={updateDraft} currentStep={currentStep} setCurrentStep={setCurrentStep} onClose={() => setView('dashboard')} onPublish={handlePublish} />
        )}
      </div>
    </div>
  );
}

function CreationFlow({ draft, updateDraft, currentStep, setCurrentStep, onClose, onPublish }) {
  const handleExport = () => {
    let content = `=== ÉVALUATION : SIMULATION META ADS ===\nDate : ${new Date().toLocaleString('fr-FR')}\n\n`;
    content += `--- 1. CAMPAGNE ---\nNom : ${draft.campaign.name}\nObjectif : ${draft.campaign.objective}\n\n`;
    content += `--- 2. ENSEMBLE DE PUBLICITÉS ---\nNom : ${draft.adSet.name}\nBudget : ${draft.adSet.budget}€ (${draft.adSet.budgetType})\nLieux : ${draft.adSet.locations}\nÂge : ${draft.adSet.ageMin} à ${draft.adSet.ageMax}\nCiblage avancé : ${draft.adSet.detailedTargeting || 'Aucun'}\nPlacements : ${draft.adSet.placements}\n\n`;
    content += `--- 3. PUBLICITÉ ---\nNom : ${draft.ad.name}\nPage Facebook : ${draft.ad.facebookPage}\nFormat : ${draft.ad.format}\nTexte principal : ${draft.ad.primaryText}\nCall to Action : ${draft.ad.callToAction}\n`;

    if (draft.ad.format === 'CAROUSEL') {
      content += `\n--- CARTES CARROUSEL ---\n`;
      draft.ad.carouselCards.forEach((c, i) => {
        content += `Carte ${i+1} : Titre="${c.headline}" | URL="${c.url}"\n`;
      });
    } else {
      content += `Titre : ${draft.ad.headline}\nURL : ${draft.ad.url}\n`;
    }
    content += `Paramètres UTM : ${draft.ad.urlParameters}\nPixel Activé : ${draft.ad.pixelActive ? 'OUI' : 'NON'}`;

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `MetaAds_${draft.campaign.name.replace(/\s+/g, '_')}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  return (
    <div className="flex-1 flex flex-col h-full bg-white absolute inset-0 z-30">
      <header className="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center shadow-sm shrink-0">
        <div className="flex items-center gap-4">
          <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X size={20} className="text-gray-500" /></button>
          <div className="flex items-center gap-2 text-sm">
            <span className="text-gray-500">Brouillon</span><ChevronRight size={14} className="text-gray-400" />
            <span className="font-semibold text-gray-900">{draft.campaign.name}</span>
          </div>
        </div>
        <div className="flex gap-3">
          <button onClick={handleExport} className="px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded-md text-sm hover:bg-gray-50 flex items-center gap-2">
            <Download size={16} /> Exporter (.txt)
          </button>
          <button onClick={onPublish} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md text-sm transition-colors shadow-sm">Publier</button>
        </div>
      </header>

      <div className="flex flex-1 overflow-hidden">
        <div className="w-64 bg-gray-50 border-r border-gray-200 overflow-y-auto p-4 hidden md:block shrink-0">
          <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">Structure</h3>
          <div className="space-y-1">
            <div className={`flex items-center gap-2 p-2 rounded-md cursor-pointer text-sm ${currentStep === 'campaign' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-700 hover:bg-gray-200'}`} onClick={() => setCurrentStep('campaign')}>
              <Folder size={16} className={currentStep === 'campaign' ? 'text-blue-600' : 'text-gray-400'} />
              <span className="truncate">{draft.campaign.name}</span>
            </div>
            <div className="ml-4 border-l border-gray-300 pl-4 space-y-1">
              <div className={`flex items-center gap-2 p-2 rounded-md cursor-pointer text-sm ${currentStep === 'adset' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-700 hover:bg-gray-200'}`} onClick={() => setCurrentStep('adset')}>
                <Layout size={16} className={currentStep === 'adset' ? 'text-blue-600' : 'text-gray-400'} />
                <span className="truncate">{draft.adSet.name}</span>
              </div>
              <div className="ml-4 border-l border-gray-300 pl-4">
                <div className={`flex items-center gap-2 p-2 rounded-md cursor-pointer text-sm ${currentStep === 'ad' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-700 hover:bg-gray-200'}`} onClick={() => setCurrentStep('ad')}>

            </div>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto bg-gray-100 p-6">

    </div>
  );
}

    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => { updateDraft('ad', 'media', { ...draft.ad.media, [placement]: reader.result }); };
      reader.readAsDataURL(file);

        const newCards = [...draft.ad.carouselCards];

        updateDraft('ad', 'carouselCards', newCards);

  const updateCarouselCard = (index, field, value) => {
    const newCards = [...draft.ad.carouselCards];
    newCards[index][field] = value;
    updateDraft('ad', 'carouselCards', newCards);
  };

  const addCarouselCard = () => {
    const newCards = [...draft.ad.carouselCards, { id: Date.now(), image: '', headline: `Titre de la carte ${draft.ad.carouselCards.length + 1}`, url: '' }];
